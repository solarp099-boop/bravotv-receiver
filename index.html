<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BravoTV Receiver</title>

    <script
        src="https://www.gstatic.com/cv/js/sender/v1/cast_receiver_framework.js">
    </script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: black;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>

<body>

<video id="video" autoplay controls></video>

<script>

const context =
    cast.framework.CastReceiverContext.getInstance()

const playerManager =
    context.getPlayerManager()

const video =
    document.getElementById('video')

playerManager.setMessageInterceptor(
    cast.framework.messages.MessageType.LOAD,

    loadRequestData => {

        const url =
            loadRequestData.media.contentId

        if (Hls.isSupported()) {

            const hls = new Hls()

            hls.loadSource(url)

            hls.attachMedia(video)

            hls.on(Hls.Events.MANIFEST_PARSED, () => {

                video.play()
            })

        } else {

            video.src = url

            video.play()
        }

        return loadRequestData
    }
)

context.start()

</script>

</body>
</html>
